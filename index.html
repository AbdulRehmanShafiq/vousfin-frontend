    <script>
      (function () {
        try {
          var raw = localStorage.getItem('vf-theme');
          var key = raw ? (JSON.parse(raw).state || {}).theme : null;
          var valid = ['atelier','eclipse','terminal','maison','daybreak'];
          document.documentElement.setAttribute(
            'data-theme',
            (key && valid.indexOf(key) !== -1) ? key : 'atelier'
          );
          // Calm density (radical-minimal surfaces) — default ON, reversible.
          var draw = localStorage.getItem('vf-density');
          var dkey = draw ? (JSON.parse(draw).state || {}).density : null;
          document.documentElement.setAttribute('data-density', dkey === 'cozy' ? 'cozy' : 'calm');
        } catch (e) {
          document.documentElement.setAttribute('data-density', 'calm');
        }
      })();
    </script>
